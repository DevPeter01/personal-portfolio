<!-- Web Corner Decoration SVG -->
<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Corner web pattern -->
  <path d="M0 0 L100 100" stroke="#E62429" stroke-width="1" opacity="0.6"/>
  <path d="M20 0 L100 80" stroke="#E62429" stroke-width="1" opacity="0.4"/>
  <path d="M0 20 L80 100" stroke="#E62429" stroke-width="1" opacity="0.4"/>
  
  <!-- Web nodes -->
  <circle cx="30" cy="30" r="3" fill="#E62429" opacity="0.7"/>
  <circle cx="60" cy="60" r="3" fill="#E62429" opacity="0.7"/>
  <circle cx="90" cy="90" r="3" fill="#E62429" opacity="0.7"/>
  
  <!-- Spiral web effect -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="50" r="15" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="50" r="10" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.3"/>
</svg>
