<!-- Spider-Man Sitting Placeholder SVG -->
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Spider-Man silhouette sitting pose -->
  <g id="spiderman-sitting">
    <!-- Head -->
    <ellipse cx="100" cy="60" rx="25" ry="28" fill="#E62429"/>
    <!-- Eyes (mask lenses) -->
    <ellipse cx="90" cy="55" rx="10" ry="12" fill="white" opacity="0.9"/>
    <ellipse cx="110" cy="55" rx="10" ry="12" fill="white" opacity="0.9"/>
    
    <!-- Body -->
    <path d="M75 85 Q75 100 75 120 L125 120 Q125 100 125 85 Z" fill="#E62429"/>
    
    <!-- Spider emblem on chest -->
    <path d="M100 90 L105 100 L100 95 L95 100 Z" fill="black" opacity="0.6"/>
    
    <!-- Arms -->
    <path d="M75 90 Q60 95 50 110 L55 115 Q65 100 75 95" fill="#8B0000"/>
    <path d="M125 90 Q140 95 150 110 L145 115 Q135 100 125 95" fill="#8B0000"/>
    
    <!-- Legs (sitting position) -->
    <path d="M80 120 L75 150 L70 180 L80 180 L85 150" fill="#0066CC"/>
    <path d="M120 120 L125 150 L130 180 L120 180 L115 150" fill="#0066CC"/>
    
    <!-- Web pattern lines on suit -->
    <line x1="100" y1="85" x2="90" y2="100" stroke="black" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="85" x2="110" y2="100" stroke="black" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="95" x2="85" y2="110" stroke="black" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="95" x2="115" y2="110" stroke="black" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Hanging web strand -->
  <path d="M100 10 Q105 30 100 50" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
